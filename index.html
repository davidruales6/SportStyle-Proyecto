<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportStyle | Elite Performance</title>
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ENVOLVEMOS EL CONTENIDO PARA EMPUJAR EL FOOTER -->
    <main class="content-wrapper">
        <!-- Navbar Estilo Marathon -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#" onclick="loadPage('inicio')">SPORT<span class="text-warning">STYLE</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto text-uppercase fw-bold">
                        <li class="nav-item"><a class="nav-link" href="#" onclick="loadPage('inicio')">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="loadPage('productos')">Productos</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="loadPage('nosotros')">Nosotros</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="loadPage('contacto')">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Contenedor Dinámico -->
        <div id="content"></div>
    </main>

    <!-- Footer con firma de David Ruales Sport y Contacto -->
    <footer class="bg-black text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2 opacity-75" style="font-size: 0.85rem;">
                &copy; 2026 SportStyle Ecuador - Innovación Deportiva de <strong>David Ruales Sport</strong>
            </p>
            <div class="d-flex justify-content-center gap-3 flex-wrap" style="font-size: 0.9rem;">
                <span class="text-warning">
                    <strong>Instagram:</strong> <span class="text-white opacity-75">david.ruales.0307</span>
                </span>
                <span class="text-warning">
                    <strong>WhatsApp:</strong> <span class="text-white opacity-75">0980847656</span>
                </span>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <!-- Modal para Agregar/Editar Comentario -->
    <div class="modal fade" id="commentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-warning border-2">
                <div class="modal-header border-warning">
                    <h5 class="modal-title fw-bold" id="modalTitle">NUEVO COMENTARIO</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="small text-uppercase opacity-75">Tu Nombre</label>
                        <input type="text" id="modal-name" class="form-control bg-transparent text-white border-secondary" placeholder="Ej: David Ruales">
                    </div>
                    <div class="mb-3">
                        <label class="small text-uppercase opacity-75">Tu Opinión</label>
                        <textarea id="modal-text" class="form-control bg-transparent text-white border-secondary" rows="3" placeholder="Escribe aquí..."></textarea>
                    </div>
                    <button class="btn btn-main w-100 fw-bold" onclick="saveComment()">PUBLICAR COMENTARIO</button>
                    <input type="hidden" id="editIndex" value="-1">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
